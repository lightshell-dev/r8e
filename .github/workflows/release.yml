name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release library
        run: make release

      - name: Archive release library
        run: |
          cp build/libr8e.a libr8e-release.a

      - name: Build size-optimized library
        run: |
          make clean && make size
          cp build/libr8e.a libr8e-size-optimized.a

      - name: Run tests
        continue-on-error: true
        run: make clean && make test

      - name: Report sizes
        run: |
          release_size=$(wc -c < libr8e-release.a | tr -d ' ')
          size_opt=$(wc -c < libr8e-size-optimized.a | tr -d ' ')
          echo "### Release Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| libr8e-release.a | **$(( release_size / 1024 ))KB** (${release_size} bytes) |" >> $GITHUB_STEP_SUMMARY
          echo "| libr8e-size-optimized.a | **$(( size_opt / 1024 ))KB** (${size_opt} bytes) |" >> $GITHUB_STEP_SUMMARY

      - name: Create source tarball
        run: |
          tag="${{ github.ref_name }}"
          git archive --format=tar.gz --prefix="r8e-${tag}/" HEAD -o "r8e-${tag}-source.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            libr8e-release.a
            libr8e-size-optimized.a
            r8e-${{ github.ref_name }}-source.tar.gz
