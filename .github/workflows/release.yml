name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          # Get latest tag or start at v0.0.0
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $latest_tag"

          # Parse semver
          major=$(echo "$latest_tag" | sed 's/v//' | cut -d. -f1)
          minor=$(echo "$latest_tag" | sed 's/v//' | cut -d. -f2)
          patch=$(echo "$latest_tag" | sed 's/v//' | cut -d. -f3)

          # Check commit messages since last tag for version bump hints
          commits=$(git log "$latest_tag"..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          if echo "$commits" | grep -qi "breaking\|major"; then
            major=$((major + 1))
            minor=0
            patch=0
          elif echo "$commits" | grep -qi "feat\|feature\|add"; then
            minor=$((minor + 1))
            patch=0
          else
            patch=$((patch + 1))
          fi

          new_tag="v${major}.${minor}.${patch}"
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT
          echo "New version: $new_tag"

      - name: Build release binary
        run: make release

      - name: Build size-optimized binary
        run: |
          make clean && make size
          if [ -f r8e ]; then
            mv r8e r8e-size-optimized
          fi
          make clean && make release
          if [ -f r8e ]; then
            mv r8e r8e-release
          fi

      - name: Run tests
        run: make clean && make debug && make test

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.new_tag }}
          git push origin ${{ steps.version.outputs.new_tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          generate_release_notes: true
          files: |
            r8e-release
            r8e-size-optimized
