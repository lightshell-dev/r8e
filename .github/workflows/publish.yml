name: Publish

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-platform:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            cc: gcc
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            cc: gcc
          - os: macos-latest
            platform: macos-arm64
            cc: clang
          - os: macos-13
            platform: macos-x64
            cc: clang
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set compiler
        run: echo "CC=${{ matrix.cc }}" >> $GITHUB_ENV

      - name: Build release library
        run: make release

      - name: Package platform tarball
        run: |
          staging="libr8e-${{ matrix.platform }}"
          mkdir -p "${staging}/build"
          mkdir -p "${staging}/include"
          cp build/libr8e.a "${staging}/build/"
          cp include/*.h "${staging}/include/"
          if [ -f LICENSE ]; then
            cp LICENSE "${staging}/"
          fi
          tar czf "${staging}.tar.gz" "${staging}"

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: libr8e-${{ matrix.platform }}
          path: libr8e-${{ matrix.platform }}.tar.gz

  publish:
    needs: build-platform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create source distribution tarball
        run: |
          tag="${{ github.event.release.tag_name }}"
          git archive --format=tar.gz --prefix="r8e-${tag}-source/" HEAD -o "r8e-${tag}-source.tar.gz"

      - name: Collect all tarballs
        run: |
          mkdir -p dist
          find artifacts -name '*.tar.gz' -exec cp {} dist/ \;
          cp r8e-*.tar.gz dist/ 2>/dev/null || true
          ls -lh dist/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/*
